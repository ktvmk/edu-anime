<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>シーソーで あそぼう</title>
<style>
  @font-face{ font-family:"PopJP"; src:url("font/MochiyPopOne-Regular.ttf") format("truetype"); font-display:swap; }
  :root{ color-scheme:light only; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ background:#fff !important; color:#1a2a3a !important; font-family:"PopJP","Hiragino Maru Gothic ProN",sans-serif; }
  @media (prefers-color-scheme:dark){ html,body{background:#fff!important;color:#1a2a3a!important;} }
  .wrap{ max-width:min(98vw, calc((100vh - 150px) * 16 / 9)); margin:0 auto; padding:8px 10px 18px; }
  .scenelabel{ text-align:center; font-size:23px; color:#1f7a37; margin-bottom:6px; min-height:28px; }

  .stage{ position:relative; width:100%; aspect-ratio:16/9; border-radius:18px; overflow:hidden; box-shadow:0 8px 28px rgba(0,0,0,.16); background:#cfe8f5; }
  .stage img.bg{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
  .layer{ position:absolute; bottom:9%; opacity:0; transition:opacity .3s ease, transform .45s ease, bottom .45s ease;
    filter:drop-shadow(0 4px 4px rgba(0,0,0,.18)); pointer-events:none; }
  .show{ opacity:1 !important; }

  .kanban{ left:50%; top:24%; bottom:auto; transform:translateX(-50%); width:58%; }
  .titletext{ position:absolute; left:50%; top:52%; transform:translate(-50%,-50%) scale(.6);
    font-size:44px; color:#3a7d2c; opacity:0; transition:opacity .4s,transform .4s; white-space:nowrap; text-shadow:2px 2px 0 #fff; z-index:6; }
  .titletext.show{ opacity:1; transform:translate(-50%,-50%) scale(1); }
  .hint{ position:absolute; left:50%; top:74%; transform:translateX(-50%); font-size:18px; color:#2c5b8a; opacity:0; transition:opacity .4s; z-index:6; }
  .hint.show{ opacity:1; }

  /* シーソー グループ（板＋2人が一緒に傾く） */
  .seesawgroup{ left:52%; bottom:9%; width:52%; height:50%; transform:translateX(-50%) rotate(0deg);
    transform-origin:50% 82%; transition:transform .6s ease, opacity .3s; }
  .seesawgroup img{ position:absolute; }
  #seesaw{ left:50%; bottom:0; width:100%; transform:translateX(-50%); }
  #ss_ki{ left:26%; bottom:25%; height:60%; transform:translateX(-50%); }
  #ss_ao{ left:74%; bottom:21%; height:60%; transform:translateX(-50%) scaleX(-1); }

  /* 絵カード（裏向き→めくる） */
  .cardrow{ position:absolute; top:30%; left:58%; transform:translateX(-50%); display:flex; gap:22px; opacity:0; transition:opacity .4s; z-index:20; }
  .cardrow.show{ opacity:1; }
  .card{ width:116px; height:158px; perspective:700px; transition:opacity .3s, transform .3s; }
  .card .inner{ position:relative; width:100%; height:100%; transition:transform .55s cubic-bezier(.4,.2,.2,1); transform-style:preserve-3d; }
  .card.flip .inner{ transform:rotateY(180deg); }
  .card .face{ position:absolute; inset:0; backface-visibility:hidden; border-radius:14px; overflow:hidden; border:4px solid #e7cf98; background:#fff; box-shadow:0 4px 10px rgba(0,0,0,.15); }
  .card .face img{ width:100%; height:100%; object-fit:contain; }
  .card .reveal{ transform:rotateY(180deg); border-color:#2E9E4F; }
  .card.dim{ opacity:.3; }

  .kw{ position:absolute; left:50%; top:0.5%; transform:translate(-50%,0) scale(.3); opacity:0;
    transition:opacity .2s, transform .3s cubic-bezier(.3,1.4,.5,1); z-index:40; }
  .kw .giza{ width:200px; }
  .kw .kwtext{ position:absolute; left:50%; top:45%; transform:translate(-50%,-50%); font-size:24px; color:#e2603b; white-space:nowrap; }
  .kw.on{ opacity:1; transform:translate(-50%,0) scale(1); }

  .cc{ position:absolute; inset:0; pointer-events:none; overflow:hidden; z-index:25; }
  .cc i{ position:absolute; top:-12px; width:10px; height:14px; border-radius:2px; animation:fall linear forwards; }
  @keyframes fall{ to{ transform:translateY(130%) rotate(540deg); } }

  .panel{ margin-top:16px; display:flex; flex-wrap:wrap; gap:10px; justify-content:center; }
  button{ font-family:inherit; font-size:17px; cursor:pointer; border:none; border-radius:14px; padding:13px 20px; color:#fff; background:#2E9E4F; box-shadow:0 4px 0 #1f7a37; transition:transform .05s; }
  button:active{ transform:translateY(2px); box-shadow:0 2px 0 #1f7a37; }
  button.sub{ background:#5a7da0; box-shadow:0 4px 0 #41607e; }
  button.gold{ background:#e8902e; box-shadow:0 4px 0 #b96f18; }
  button.big{ font-size:20px; padding:15px 28px; }
  button:disabled{ background:#c2ccd6; box-shadow:0 4px 0 #aab6c2; cursor:default; }
  .dots{ margin-top:12px; text-align:center; }
  .dots span{ display:inline-block; width:13px; height:13px; border-radius:50%; background:#cdd8e2; margin:0 5px; }
  .dots span.on{ background:#2E9E4F; transform:scale(1.3); }

  .wrap:fullscreen, .wrap:-webkit-full-screen{ width:100vw; height:100vh; background:#10241a; padding:0; display:flex; flex-direction:column; justify-content:center; max-width:none; }
  .wrap:fullscreen .scenelabel{ color:#d7eed3; margin:6px 0; flex:0 0 auto; }
  .wrap:fullscreen .stage{ flex:1 1 auto; width:auto; height:auto; max-width:100vw; max-height:calc(100vh - 130px); margin:0 auto; border-radius:0; }
  .wrap:fullscreen .dots{ margin:6px 0; flex:0 0 auto; }
  .wrap:fullscreen .panel{ margin:6px 0 10px; flex:0 0 auto; }
</style>
</head>
<body>
<div class="wrap">
  <a href="../" class="homebtn" style="position:fixed;top:10px;left:12px;z-index:9999;background:#fff;border:3px solid #86d79a;border-radius:18px;padding:5px 13px;font-family:inherit;font-size:15px;line-height:1.2;color:#2e9e4f;text-decoration:none;box-shadow:0 3px 9px rgba(0,0,0,.18);">🏠 ホーム</a>
  <div class="scenelabel" id="scenelabel">シーソーで あそぼう</div>
  <div class="stage" id="stage" data-scene="0">
    <img class="bg" src="img/haikei_seesaw.png" alt="">
    <div class="cc" id="cc"></div>

    <img class="layer kanban" id="kanban" src="img/e1_kanban.png">
    <div class="titletext" id="titletext">シーソーで あそぼう</div>
    <div class="hint" id="hint">▶ ぜんぶ さいせい で はじめるよ</div>

    <!-- 絵カード（裏向き、1枚めくると 青 が出る） -->
    <div class="cardrow" id="cardrow">
      <div class="card" id="c0"><div class="inner"><div class="face cover"><img src="img/card_back.png"></div><div class="face reveal"><img src="img/h3_face_midori.png"></div></div></div>
      <div class="card" id="c1"><div class="inner"><div class="face cover"><img src="img/card_back.png"></div><div class="face reveal"><img src="img/h4_face_pink.png"></div></div></div>
      <div class="card" id="c2"><div class="inner"><div class="face cover"><img src="img/card_back.png"></div><div class="face reveal"><img src="img/h2_face_ao.png"></div></div></div>
      <div class="card" id="c3"><div class="inner"><div class="face cover"><img src="img/card_back.png"></div><div class="face reveal"><img src="img/h5_face_orange.png"></div></div></div>
    </div>

    <!-- 先生（大きめ） -->
    <img class="layer" id="sensei"     src="img/inv_sensei.png" style="left:12%;bottom:7%;height:48%;transform:translateX(-50%)">
    <img class="layer" id="sensei_joy" src="img/inv_sensei.png" style="left:12%;bottom:7%;height:50%;transform:translateX(-50%)">

    <!-- 黄A（誘う・男の子）・青B（いいよ・女の子＝カードと一致） -->
    <img class="layer" id="ki_sasou"   src="img/inv_ki.png" style="left:34%;bottom:8%;height:44%;transform:translateX(-50%)">
    <img class="layer" id="ao_unazuku" src="img/inv_ao.png" style="left:62%;bottom:8%;height:44%;transform:translateX(-50%)">

    <!-- カード選び場面用：空のシーソー（文脈表示） -->
    <img class="layer" id="ss_empty" src="img/b1_seesaw.png" style="left:69%;bottom:15%;width:38%;transform:translateX(-50%)">

    <!-- シーソー グループ（板＋2人が一緒に傾く） -->
    <div class="layer seesawgroup" id="seesawgroup">
      <img id="seesaw" src="img/b1_seesaw.png">
      <img id="ss_ki"  src="img/ss_ki_ride.png">
      <img id="ss_ao"  src="img/ss_ao_ride.png">
    </div>

    <!-- 喜び（後ろ3人＝小さく先に・前2人＝大きく後に重ねる） -->
    <img class="layer" id="joy_midori" src="img/joy_midori.png" style="left:30%;bottom:30%;height:22%;transform:translateX(-50%)">
    <img class="layer" id="joy_pink"   src="img/joy_pink.png"   style="left:50%;bottom:31%;height:22%;transform:translateX(-50%)">
    <img class="layer" id="joy_orange" src="img/joy_orange.png" style="left:70%;bottom:30%;height:22%;transform:translateX(-50%)">
    <img class="layer" id="joy_ki"     src="img/joy_ki.png"     style="left:40%;bottom:8%;height:36%;transform:translateX(-50%)">
    <img class="layer" id="joy_ao"     src="img/joy_ao.png"     style="left:62%;bottom:8%;height:36%;transform:translateX(-50%)">

    <img class="layer" id="balloon" src="img/e9_balloon.png" style="left:90%;bottom:auto;top:5%;height:22%">
    <img class="layer" id="hanamaru" src="img/e8_hanamaru.png" style="left:10%;bottom:auto;top:6%;height:18%">

    <div class="kw" id="kw"><img class="giza" src="img/e4_fukidashi_giza.png"><div class="kwtext" id="kwtext"></div></div>
  </div>

  <div class="dots" id="dots"></div>
  <div class="panel">
    <button class="gold big" id="playall">▶ ぜんぶ さいせい</button>
    <button class="sub" id="pause">⏸ ストップ</button>
    <button class="sub" id="prev">◀ まえ</button>
    <button id="play">このばめん</button>
    <button class="sub" id="next">つぎ ▶</button>
    <button class="sub" id="replay">↺ さいしょから</button>
    <button class="sub" id="stopbgm">♪ おんがく とめる</button>
    <button class="sub" id="fs">⛶ ぜんがめん</button>
  </div>
</div>

<script>
const $=id=>document.getElementById(id);
const stage=$('stage'), label=$('scenelabel'), kw=$('kw'), kwtext=$('kwtext'), cc=$('cc');
const cardIds=["c0","c1","c2","c3"];

const SCENES=[
  { title:"シーソーで あそぼう", show:["kanban","titletext","hint","balloon"], type:"title" },
  { title:"カードを えらぼう", show:["sensei","ki_sasou","ss_empty"], type:"cards" },
  { title:"いっしょに あそぼう", show:["sensei","ki_sasou","ao_unazuku"], type:"invite" },
  { title:"ぎったん ばっこん", show:["seesawgroup","sensei"], type:"ride" },
  { title:"なかよく あそべたね", show:["joy_midori","joy_pink","joy_orange","joy_ki","joy_ao","sensei_joy","balloon","hanamaru"], type:"celebrate" },
];

let cur=0, busy=false, cancel=false, bgmMuted=false;
const audioEl=new Audio();
const bgm=new Audio("bgm.mp3"); bgm.loop=true; bgm.volume=0.16;
const allLayers=["kanban","titletext","hint","sensei","sensei_joy","ki_sasou","ao_unazuku",
  "ss_empty","seesawgroup","joy_midori","joy_pink","joy_orange","joy_ki","joy_ao","balloon","hanamaru"];

SCENES.forEach(()=>{const s=document.createElement('span');$('dots').appendChild(s);});
const dots=document.querySelectorAll('#dots span');

function startBgm(){ if(!bgmMuted && bgm.paused){ bgm.volume=0.16; bgm.play().catch(()=>{}); } }
function fadeOutBgm(){ const step=()=>{ if(bgm.volume>0.02){ bgm.volume=Math.max(0,bgm.volume-0.02); setTimeout(step,70);} else { bgm.pause(); bgm.currentTime=0; bgm.volume=0.16; } }; step(); }
function clearAll(){ allLayers.forEach(id=>$(id).classList.remove('show')); kw.classList.remove('on');
  $('cardrow').classList.remove('show'); cardIds.forEach(c=>{$(c).classList.remove('flip'); $(c).classList.remove('dim');}); }
function tilt(deg){ $('seesawgroup').style.transform=`translateX(-50%) rotate(${deg}deg)`; }
function setScene(n){
  cur=Math.max(0,Math.min(SCENES.length-1,n)); const s=SCENES[cur];
  stage.dataset.scene=cur; label.textContent=s.title;
  clearAll(); tilt(0);
  (s.show||[]).forEach(id=>$(id).classList.add('show'));
  if(s.type==="cards") $('cardrow').classList.add('show');
  dots.forEach((d,i)=>d.classList.toggle('on',i<=cur));
  $('prev').disabled=(cur===0); $('next').disabled=(cur===SCENES.length-1);
}
function stopAudio(){ cancel=true; audioEl.pause(); bgm.pause(); }
function wait(ms){ return new Promise(r=>setTimeout(r,ms)); }
function playWav(name){ return new Promise(res=>{ audioEl.src="se2/"+name+".wav"; audioEl.onended=res; audioEl.onerror=res; audioEl.play().catch(()=>res()); }); }
async function say(name, gap){ await playWav(name); if(cancel)return; await wait(gap===undefined?650:gap); }
function popKW(t){ kwtext.textContent=t; kw.classList.add('on'); }
function rain(n){ const c=["#ff6b7a","#ffd75e","#5fb85f","#5aa8e0","#c178e0","#ff9f4a"];
  for(let i=0;i<n;i++){ const e=document.createElement('i'); e.style.left=Math.random()*100+"%"; e.style.background=c[i%c.length];
    e.style.animationDuration=(1.6+Math.random()*1.4)+"s"; e.style.animationDelay=(Math.random()*.5)+"s"; cc.appendChild(e); setTimeout(()=>e.remove(),3600);} }

async function choreo(){
  const s=SCENES[cur];
  if(s.type==="title"){ await wait(1100); return; }

  if(s.type==="cards"){
    await say("s01",1000); if(cancel)return;         // シーソーであそぼう
    await say("s02",1100); if(cancel)return;         // カードをえらんでね
    await say("s03",1000); if(cancel)return;         // どのカードにしようかな
    $('c2').classList.add('flip'); ["c0","c1","c3"].forEach(c=>$(c).classList.add('dim'));   // 右から2番目をめくる→青
    await wait(900);
    await playWav("s04"); return;                    // あおさんとのろー
  }

  if(s.type==="invite"){                              // めくれた青を実際に誘う（対応関係）
    await say("s05",1050); if(cancel)return;         // いっしょにあそぼう
    await playWav("s06"); return;                    // いいよ
  }

  if(s.type==="ride"){
    tilt(0);
    await say("s07",950); if(cancel)return;          // シーソーにのろう
    const p=playWav("s08");                          // ぎったんばっこん（板＋2人が一緒に傾く）
    for(let k=0;k<3;k++){ tilt(8); await wait(640); if(cancel)return; tilt(-8); await wait(640); if(cancel)return; }
    tilt(0);
    await p; if(cancel)return;
    await playWav("s09"); return;                    // たのしー
  }

  if(s.type==="celebrate"){
    popKW("やったー！");
    await playWav("s10"); if(cancel)return; rain(50); await wait(1050);
    await playWav("s11"); return;                    // なかよくあそべたね
  }
}

async function playOne(){ if(busy)return; busy=true; cancel=false; startBgm(); setBtns(true); await choreo(); if(!cancel) fadeOutBgm(); busy=false; setBtns(false); }
async function playAll(start){
  if(busy)return; busy=true; cancel=false; startBgm(); setBtns(true); $('pause').textContent="⏸ ストップ";
  for(let i=(start||0);i<SCENES.length;i++){ if(cancel)break; setScene(i); await wait(650); if(cancel)break; await choreo(); if(cancel)break; await wait(1400); }
  if(!cancel) fadeOutBgm();
  busy=false; setBtns(false); $('pause').textContent="⏸ ストップ";
}
function setBtns(on){ $('playall').textContent=on?"さいせい中…":"▶ ぜんぶ さいせい"; $('playall').disabled=on; $('play').disabled=on; }

$('playall').onclick=()=>playAll();
$('pause').onclick=()=>{ if(busy){ stopAudio(); busy=false; setBtns(false); $('pause').textContent="▶ つづき"; } else { playAll(cur); } };
$('play').onclick=()=>playOne();
$('next').onclick=()=>{ stopAudio(); busy=false; setBtns(false); $('pause').textContent="⏸ ストップ"; setScene(cur+1); };
$('prev').onclick=()=>{ stopAudio(); busy=false; setBtns(false); $('pause').textContent="⏸ ストップ"; setScene(cur-1); };
$('replay').onclick=()=>{ stopAudio(); busy=false; setBtns(false); $('pause').textContent="⏸ ストップ"; setScene(0); };
$('fs').onclick=()=>{ const w=document.querySelector('.wrap'); if(!document.fullscreenElement){ (w.requestFullscreen||w.webkitRequestFullscreen)?.call(w); } else { document.exitFullscreen?.(); } };
$('stopbgm').onclick=()=>{ bgmMuted=!bgmMuted;
  if(bgmMuted){ bgm.pause(); $('stopbgm').textContent="♪ おんがく つける"; }
  else { bgm.volume=0.16; bgm.play().catch(()=>{}); $('stopbgm').textContent="♪ おんがく とめる"; } };

setScene(0);
</script>
</body>
</html>
