<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>きょうざい あにめ</title>
<style>
  @font-face{ font-family:"PopJP"; src:url("font/MochiyPopOne-Regular.ttf") format("truetype"); font-display:swap; }
  :root{ color-scheme:light only; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; padding:0; min-height:100%; }
  body{
    font-family:"PopJP","Hiragino Maru Gothic ProN","Yu Gothic UI",sans-serif;
    background:linear-gradient(160deg,#fff7e6 0%,#ffe9ef 45%,#e6f6ff 100%);
    color:#444; text-align:center; overflow-x:hidden;
    display:flex; flex-direction:column; align-items:center;
    padding:5vh 4vw 6vh;
  }

  /* ---- header ---- */
  .head{ position:relative; margin-bottom:5vh; }
  .eyebrow{ font-size:clamp(13px,3vw,19px); color:#2e9e4f; letter-spacing:4px; margin:0 0 4px; }
  h1{ font-size:clamp(30px,7vw,56px); color:#e8702a; margin:0 0 6px; letter-spacing:2px;
       text-shadow:0 3px 0 #ffd9a0; }
  .sub{ font-size:clamp(14px,3.4vw,21px); color:#7a7a7a; margin:0; }
  .hanamaru{ position:absolute; width:54px; height:auto; top:6px; }
  .hanamaru.l{ left:-70px; transform:rotate(-12deg); }
  .hanamaru.r{ right:-70px; transform:rotate(12deg); }

  /* ---- cards ---- */
  .grid{
    display:grid; gap:clamp(20px,3.5vw,40px);
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    width:100%; max-width:1180px;
  }
  a.card{
    display:block; text-decoration:none; color:#444;
    background:#fff; border-radius:32px; padding:16px 16px 24px;
    box-shadow:0 10px 26px rgba(0,0,0,.12);
    border:5px solid #fff; transition:transform .12s ease, box-shadow .12s ease;
  }
  a.card:active{ transform:scale(.98); }
  a.card:hover{ transform:translateY(-5px); box-shadow:0 18px 36px rgba(0,0,0,.18); }
  .thumb{
    position:relative; width:100%; aspect-ratio:4/3; border-radius:22px; overflow:hidden;
    margin-bottom:14px;
  }
  .thumb .bg{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
  .thumb .prop{ position:absolute; filter:drop-shadow(0 4px 6px rgba(0,0,0,.22)); }
  .name{ font-size:clamp(22px,4.4vw,30px); }

  .c1{ border-color:#ffcf66; } .c1 .name{ color:#e8702a; }
  .c2{ border-color:#7fc4f5; } .c2 .name{ color:#1f7fc4; }
  .c3{ border-color:#86d79a; } .c3 .name{ color:#2e9e4f; }

  /* watermelon: white + blue sticks as inverted-ハ (V, tops splayed out) */
  .p-bou-w{ left:50%; bottom:11%; width:46%; transform-origin:left center; transform:rotate(-110deg); z-index:1; }
  .p-bou-b{ left:50%; bottom:11%; width:46%; transform-origin:left center; transform:rotate(-70deg);  z-index:1; }
  .p-suika{ bottom:7%;  left:50%; width:35%; transform:translateX(-50%); z-index:2; }
  /* traffic light */
  .p-shingo{ bottom:5%; left:50%; height:86%; transform:translateX(-50%); z-index:2; }
  /* seesaw */
  .p-seesaw{ bottom:20%; left:50%; width:84%; transform:translateX(-50%); z-index:2; }

  /* ---- bottom scene (sensei + 5 kids on painted park bg) ---- */
  .scene{
    position:relative; width:100%; max-width:1180px; margin:7vh auto 0;
    border-radius:36px; overflow:hidden; box-shadow:0 10px 26px rgba(0,0,0,.14);
  }
  .scene .scenebg{ position:absolute; inset:0; width:100%; height:100%;
                   object-fit:cover; object-position:center 72%; }
  .balloon{ position:absolute; height:104px; width:auto; z-index:3;
            filter:drop-shadow(0 5px 6px rgba(0,0,0,.2)); }
  .bl1{ top:16px; left:20px; transform:rotate(-8deg); }
  .bl2{ top:10px; right:24px; transform:rotate(7deg); }
  .row{ position:relative; z-index:4; display:flex; align-items:flex-end;
        justify-content:center; gap:clamp(4px,1.6vw,26px);
        flex-wrap:wrap; padding:36px 16px 16px; }
  .row img{ height:clamp(120px,17vw,190px); width:auto;
            filter:drop-shadow(0 6px 5px rgba(0,0,0,.22)); }
  .row img.sensei{ height:clamp(130px,18.5vw,206px); }

  .foot{ margin-top:4vh; font-size:13px; color:#9a9a9a; line-height:1.7; }
</style>
</head>
<body>
  <div class="head">
    <img class="hanamaru l" src="suika/img/e8_hanamaru.png" alt="">
    <img class="hanamaru r" src="suika/img/e8_hanamaru.png" alt="">
    <p class="eyebrow">たんけんたい シリーズ</p>
    <h1>きょうざい あにめ</h1>
    <p class="sub">えらんで ボタンを おしてね</p>
  </div>

  <div class="grid">
    <a class="card c1" href="suika/">
      <div class="thumb">
        <img class="bg" src="suika/img/haikei_suika.png" alt="">
        <img class="prop p-bou-w" src="suika/img/h7_bou_shiro.png" alt="">
        <img class="prop p-bou-b" src="suika/img/h6_bou_ao.png" alt="">
        <img class="prop p-suika" src="suika/img/07_suika_maru.png" alt="">
      </div>
      <div class="name">スイカわりを しよう</div>
    </a>

    <a class="card c2" href="shingo/">
      <div class="thumb">
        <img class="bg" src="shingo/img/haikei_shingo4.png" alt="">
        <img class="prop p-shingo" src="shingo/img/c1_shingo_aka.png" alt="">
      </div>
      <div class="name">しんごうを わたろう</div>
    </a>

    <a class="card c3" href="seesaw/">
      <div class="thumb">
        <img class="bg" src="seesaw/img/haikei_seesaw.png" alt="">
        <img class="prop p-seesaw" src="seesaw/img/b1_seesaw.png" alt="">
      </div>
      <div class="name">シーソーで あそぼう</div>
    </a>
  </div>

  <div class="scene">
    <img class="scenebg" src="seesaw/img/haikei_seesaw.png" alt="">
    <img class="balloon bl1" src="suika/img/e9_balloon.png" alt="">
    <img class="balloon bl2" src="suika/img/e9_balloon.png" alt="">
    <div class="row">
      <img class="sensei" src="suika/img/f6_sensei.png" alt="せんせい">
      <img src="suika/img/f1_ki_tatsu.png" alt="">
      <img src="suika/img/f2_ao_tatsu.png" alt="">
      <img src="suika/img/f3_midori_tatsu.png" alt="">
      <img src="suika/img/f4_pink_tatsu.png" alt="">
      <img src="suika/img/f5_orange_tatsu.png" alt="">
    </div>
  </div>

  <p class="foot">藤田真生 先生 用 ／ HTML教材アニメ　　うごかないときは、もういちど ページを よみこんでね</p>
</body>
</html>
